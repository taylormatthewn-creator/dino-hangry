<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Dino Hangry Rocks — 2.5D Forest Adventure</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      min-height: 100%;
      background: #07180f;
      color: #fff7d8;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      overflow: hidden;
    }
    #game-wrap {
      width: 100vw;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: radial-gradient(circle at 50% 20%, #1f6b42 0%, #0a2918 44%, #04100a 100%);
    }
    canvas {
      display: block;
      image-rendering: auto;
      border-radius: 14px;
      box-shadow: 0 24px 80px rgba(0,0,0,0.58), 0 0 0 3px rgba(255,255,255,0.08);
      max-width: 100vw;
      max-height: 100vh;
    }
  </style>
</head>
<body>
  <div id="game-wrap"></div>

  <!-- Phaser is linked from a CDN. Phaser must load BEFORE game.js. -->
  <script src="https://cdn.jsdelivr.net/npm/phaser@3.90.0/dist/phaser.min.js"></script>
  <script src="game.js"></script>
</body>
</html>
